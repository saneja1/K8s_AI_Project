apiVersion: v1
kind: Pod
metadata:
  name: test-resource-pod
spec:
  containers:
  - name: test-container
    image: ubuntu:20.04
    command: ["sleep", "3600"]
    resources:
      requests:
        memory: "4Gi"
        cpu: "2"
        ephemeral-storage: "4Gi"
